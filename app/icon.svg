<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <rect width="32" height="32" rx="8" fill="url(#grad)"/>

  <!-- Book base -->
  <rect x="7" y="9" width="18" height="15" rx="2" fill="white" opacity="0.15"/>

  <!-- Left page -->
  <rect x="7" y="9" width="8.5" height="15" rx="2" fill="white" opacity="0.9"/>

  <!-- Right page -->
  <rect x="16.5" y="9" width="8.5" height="15" rx="2" fill="white" opacity="0.7"/>

  <!-- Spine line -->
  <rect x="15.25" y="9" width="1.5" height="15" fill="url(#grad)" opacity="0.4"/>

  <!-- Lines on left page -->
  <rect x="9" y="13" width="5" height="1.2" rx="0.6" fill="url(#grad)" opacity="0.5"/>
  <rect x="9" y="15.5" width="4" height="1.2" rx="0.6" fill="url(#grad)" opacity="0.5"/>
  <rect x="9" y="18" width="5" height="1.2" rx="0.6" fill="url(#grad)" opacity="0.5"/>

  <!-- Checkmark on right page -->
  <path d="M19.5 16.5 L21.2 18.5 L24 14.5" stroke="url(#gradCheck)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>

  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="gradCheck" x1="19" y1="14" x2="24" y2="19" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
</svg>
